        /* Genel Karanlık Tema */
        body {
            background-color: #0a0a0a;
            color: #c5a880;
            font-family: 'Courier Prime', monospace;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Başlangıç Ekranı (Müziği başlatmak için gerekli) */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 1s ease;
        }
        
        #start-screen p {
            animation: pulse 2s infinite;
            font-size: 1.2rem;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

            align-items: center;
            gap: 100px;
            padding: 100px 20px;
        }

            box-shadow: 0 0 20px rgba(0,0,0,0.8);
